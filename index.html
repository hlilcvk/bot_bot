<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROPTREX | Bot Admin Panel</title>
    <style>
        :root {
            --bg: #04070d;
            --card: #0a1220;
            --border: #142238;
            --text: #e8f4ff;
            --text-dim: #8cc63f;
            --primary: #00e5ff;
            --btn-hover: #00c4db;
            --error: #ff2d55;
            --success: #00ff88;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 650px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 24px;
            margin-top: 0;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
            font-weight: 800;
            letter-spacing: 1px;
            color: var(--primary);
        }

        h2 {
            font-size: 16px;
            margin-top: 25px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 13px;
            color: #a8c8e0;
        }

        input[type="text"],
        input[type="password"],
        select {
            width: 100%;
            padding: 10px;
            background: #0f1c2e;
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            font-family: monospace;
            box-sizing: border-box;
        }

        select {
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            cursor: pointer;
        }

        .template-preview {
            margin-top: 5px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.03);
            border-left: 3px solid var(--primary);
            font-size: 11px;
            color: #8aabc5;
            white-space: pre-wrap;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: var(--primary);
        }

        button {
            background-color: var(--primary);
            color: #000;
            border: none;
            padding: 12px 20px;
            cursor: pointer;
            width: 100%;
            border-radius: 4px;
            font-weight: bold;
            font-size: 14px;
            margin-top: 20px;
            transition: background 0.2s;
        }

        button:hover {
            background-color: var(--btn-hover);
        }

        .status {
            margin-top: 15px;
            padding: 10px;
            border-radius: 4px;
            display: none;
            text-align: center;
            font-weight: bold;
            font-size: 13px;
        }

        .status.success {
            background-color: rgba(0, 255, 136, 0.1);
            color: var(--success);
            border: 1px solid var(--success);
            display: block;
        }

        .status.error {
            background-color: rgba(255, 45, 85, 0.1);
            color: var(--error);
            border: 1px solid var(--error);
            display: block;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            cursor: pointer;
        }

        #loginOverlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .login-box {
            background: var(--card);
            padding: 40px;
            border-radius: 8px;
            border: 1px solid var(--border);
            text-align: center;
            width: 300px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>

<body>

    <div id="loginOverlay">
        <div class="login-box">
            <h1 style="border:none; padding:0; margin-bottom: 20px;">Yetkili Girişi</h1>
            <input type="password" id="adminPassword" placeholder="Admin Şifresi"
                onkeydown="if(event.key==='Enter') tryLogin()" style="margin-bottom: 15px;">
            <button onclick="tryLogin()">Giriş Yap</button>
            <div id="loginError" style="color:var(--error); margin-top: 15px; display:none; font-size: 13px;">Şifre
                Hatalı!</div>
        </div>
    </div>

    <div class="container" id="adminContainer" style="display:none;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1 style="margin: 0; border: none; padding: 0;">PROPTREX PUMP BOT ADMIN</h1>
            <a href="/platform"
                style="background-color: #8cc63f; color: #000; padding: 8px 15px; text-decoration: none; border-radius: 4px; font-weight: bold; font-size: 13px; transition: 0.2s; box-shadow: 0 0 10px rgba(140, 198, 63, 0.3);">Platform'a
                Git ➔</a>
        </div>
        <p
            style="font-size: 13px; color: #a8c8e0; border-top: 1px solid var(--border); padding-top: 15px; margin-top: 0;">
            Botun otomatik olarak bildirim göndermesi için aşağıdaki API anahtarlarını ve mesaj şablonlarını
            yapılandırın.</p>

        <div id="statusMessage" class="status"></div>

        <form id="configForm">
            <!-- Telegram Settings -->
            <h2>Telegram Ayarları</h2>
            <div class="form-group">
                <label for="tg_token">Bot Token (BotFather'dan)</label>
                <input type="password" id="tg_token" name="tg_token"
                    placeholder="Örn: 123456789:ABCdefGHIjklMNOpqrSTUvwxYZ">
            </div>
            <div class="form-group">
                <label for="tg_chat_id">Kanal / Grup ID (Örn: @proptrex_radar veya -100123...)</label>
                <input type="text" id="tg_chat_id" name="tg_chat_id" placeholder="@kanal_adi">
            </div>

            <div class="form-group">
                <label for="tg_template">Telegram Mesaj Şablonu</label>
                <select id="tg_template" onchange="updatePreview('tg')">
                    <option value="T1">Şablon 1 (Resmi Radar - Detaylı)</option>
                    <option value="T2">Şablon 2 (Balina/Acil Alarm Tarzı)</option>
                    <option value="T3">Şablon 3 (Teknik Analiz / Kırılım Tarzı)</option>
                    <option value="T4">Şablon 4 (Kısa & Öz Momentum Tarzı)</option>
                </select>
                <div id="tg_preview" class="template-preview"></div>
            </div>

            <div class="form-group" style="margin-top: 20px;">
                <label class="checkbox-label">
                    <input type="checkbox" id="tg_enabled" name="tg_enabled"> <span>Telegram Bildirimlerini Aktif
                        Et</span>
                </label>
            </div>

            <!-- Twitter Settings -->
            <h2 style="margin-top: 35px;">X (Twitter) Ayarları</h2>
            <div class="form-group">
                <label for="tw_api_key">API Key</label>
                <input type="password" id="tw_api_key" name="tw_api_key">
            </div>
            <div class="form-group">
                <label for="tw_api_secret">API Key Secret</label>
                <input type="password" id="tw_api_secret" name="tw_api_secret">
            </div>
            <div class="form-group">
                <label for="tw_access_token">Access Token</label>
                <input type="password" id="tw_access_token" name="tw_access_token">
            </div>
            <div class="form-group">
                <label for="tw_access_secret">Access Token Secret</label>
                <input type="password" id="tw_access_secret" name="tw_access_secret">
            </div>

            <div class="form-group">
                <label for="tw_template">X (Twitter) Mesaj Şablonu</label>
                <select id="tw_template" onchange="updatePreview('tw')">
                    <option value="T1">Şablon 1 (Resmi Radar - Detaylı)</option>
                    <option value="T2">Şablon 2 (Balina/Acil Alarm Tarzı)</option>
                    <option value="T3">Şablon 3 (Teknik Analiz / Kırılım Tarzı)</option>
                    <option value="T4">Şablon 4 (Kısa & Öz Momentum Tarzı)</option>
                </select>
                <div id="tw_preview" class="template-preview"></div>
            </div>

            <div class="form-group" style="margin-top: 20px;">
                <label class="checkbox-label">
                    <input type="checkbox" id="tw_enabled" name="tw_enabled"> <span>X (Twitter) Paylaşımlarını Aktif
                        Et</span>
                </label>
            </div>

            <h2 style="margin-top: 35px;">Referans Linkleri (Borsalar)</h2>
            <div class="form-group">
                <label for="ref_binance">Binance Referans Linki</label>
                <input type="text" id="ref_binance" name="ref_binance" placeholder="https://www.binance.com/...">
            </div>
            <div class="form-group">
                <label for="ref_mexc">MEXC Referans Linki</label>
                <input type="text" id="ref_mexc" name="ref_mexc" placeholder="https://promote.mexc.fm/...">
            </div>
            <div class="form-group">
                <label for="ref_gate">Gate.io Referans Linki</label>
                <input type="text" id="ref_gate" name="ref_gate" placeholder="https://www.gate.io/...">
            </div>

            <button type="submit" style="margin-top: 30px;">Ayarları Kaydet ve Sunucuya Uygula</button>
        </form>
    </div>

    <script>
        const API_URL = ""; // Coolify ortamında bu ayarlanabilir

        const templates = {
            "T1": "🚀 PROPTREX PUMP RADAR 🚀\n\n📌 Coin: #BTCUSDT\n📈 Fiyat: $96000.50\n⚡️ Hacim Patlaması: 3.5x\n🔥 AI Skoru: 92/100\n🎯 Öneri: TP1 $98880.00\n\nDetaylar için Proptrex Radar'ı kontrol edin!",
            "T2": "🚨 BALINA ALARMI (PUMP) 🚨\n\nYapay zeka #BTCUSDT coininde ani hacim artışı tespit etti!\n\n💰 Anlık: $96000.50\n📊 Kuvvet: 92 Puan\n📈 Hacim Çarpanı: 3.5x\n\nErken yakalamak için Proptrex V5'e giriş yapın. ⚡️",
            "T3": "🔥 GÜÇLÜ AL SİNYALİ! 🔥\n\nProptrex Algo #BTCUSDT grafiğinde direnç kırılımı tespit etti. (Skor: 92)\nFiyat şu an $96000.50 civarında ve hacim 3.5x artış gösterdi.\n\nRisk=Ödül oranına dikkat ederek değerlendirebilirsiniz.",
            "T4": "#BTCUSDT Harekete Geçiyor! 🚀\n\n🎯 AI Sinyal Skoru: 92/100\n📈 Giriş Bandı: $95040.00 - $96960.00\n💡 Strateji: Momentum (Hacim 3.5x)\n\nDetaylı analizi görmek için Proptrex V5 platformunu ziyaret edin."
        };

        function updatePreview(type) {
            const val = document.getElementById(type + '_template').value;
            document.getElementById(type + '_preview').innerText = "Önizleme:\n" + templates[val];
        }

        // Load existing settings
        async function loadSettings() {
            try {
                const res = await fetch(`${API_URL}/api/config`);
                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('tg_token').value = data.tg_token || "";
                    document.getElementById('tg_chat_id').value = data.tg_chat_id || "";
                    document.getElementById('tg_enabled').checked = data.tg_enabled || false;
                    if (data.tg_template) document.getElementById('tg_template').value = data.tg_template;

                    document.getElementById('tw_api_key').value = data.tw_api_key || "";
                    document.getElementById('tw_api_secret').value = data.tw_api_secret || "";
                    document.getElementById('tw_access_token').value = data.tw_access_token || "";
                    document.getElementById('tw_access_secret').value = data.tw_access_secret || "";
                    document.getElementById('tw_enabled').checked = data.tw_enabled || false;
                    if (data.tw_template) document.getElementById('tw_template').value = data.tw_template;

                    document.getElementById('ref_binance').value = data.ref_binance || "";
                    document.getElementById('ref_mexc').value = data.ref_mexc || "";
                    document.getElementById('ref_gate').value = data.ref_gate || "";
                }
            } catch (error) {
                console.error("Config yüklenemedi:", error);
            }
            updatePreview('tg');
            updatePreview('tw');
        }

        async function tryLogin() {
            const pwd = document.getElementById('adminPassword').value;
            try {
                const res = await fetch(`${API_URL}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: pwd })
                });
                const data = await res.json();
                if (data.status === 'success') {
                    document.getElementById('loginOverlay').style.display = 'none';
                    document.getElementById('adminContainer').style.display = 'block';
                    loadSettings();
                } else {
                    document.getElementById('loginError').style.display = 'block';
                }
            } catch (e) {
                document.getElementById('loginError').innerText = "Bağlantı Hatası!";
                document.getElementById('loginError').style.display = 'block';
            }
        }

        // Save settings
        document.getElementById('configForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const statusEl = document.getElementById('statusMessage');
            statusEl.className = 'status';
            statusEl.innerText = "Kaydediliyor...";
            statusEl.style.display = "block";

            const config = {
                tg_token: document.getElementById('tg_token').value,
                tg_chat_id: document.getElementById('tg_chat_id').value,
                tg_enabled: document.getElementById('tg_enabled').checked,
                tg_template: document.getElementById('tg_template').value,
                tw_api_key: document.getElementById('tw_api_key').value,
                tw_api_secret: document.getElementById('tw_api_secret').value,
                tw_access_token: document.getElementById('tw_access_token').value,
                tw_access_secret: document.getElementById('tw_access_secret').value,
                tw_enabled: document.getElementById('tw_enabled').checked,
                tw_template: document.getElementById('tw_template').value,
                ref_binance: document.getElementById('ref_binance').value,
                ref_mexc: document.getElementById('ref_mexc').value,
                ref_gate: document.getElementById('ref_gate').value
            };

            try {
                const res = await fetch(`${API_URL}/api/config`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(config)
                });

                if (res.ok) {
                    statusEl.className = 'status success';
                    statusEl.innerText = "Ayarlar başarıyla kaydedildi! Yeni şablonlar aktif.";
                } else {
                    throw new Error("Sunucu hatası");
                }
            } catch (error) {
                statusEl.className = 'status error';
                statusEl.innerText = "Bağlantı hatası. API sunucusu çalışıyor mu?";
            }

            setTimeout(() => { statusEl.style.display = 'none'; }, 5000);
        });

        // Initial setup removes auto-loading until password is provided

    </script>

</body>

</html>
